name: Release

on:
    push:
        branches:
            - main

permissions: read-all

jobs:
    release:
        name: Semantic Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
            id-token: write
            attestations: write
        env:
            # Skip Husky's git hooks in CI: they are developer-machine guard
            # rails (lint-staged, publint, gitleaks) that the workflow already
            # runs explicitly via `pnpm test` / `pnpm run build` and would
            # otherwise fail when @semantic-release/git creates the release
            # commit on a runner that has no `gitleaks` binary installed.
            HUSKY: "0"

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  persist-credentials: true
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup pnpm
              uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

            - name: Setup Node.js
              # Node.js 24 ships with npm >= 11.5.1, which is the minimum
              # required for OIDC trusted publishing. Sticking with Node 22
              # forced an in-place self-upgrade of npm that fails on hosted
              # runners (https://github.com/npm/cli/issues/4815).
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: "24"
                  cache: "pnpm"
                  registry-url: "https://registry.npmjs.org/"

            - name: Print npm version
              run: npm --version

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Test
              run: pnpm test

            - name: Generate SBOM (CycloneDX)
              run: |
                  pnpm dlx @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.cdx.json --omit dev || true
                  pnpm dlx @cyclonedx/cyclonedx-npm --output-format xml  --output-file sbom.cdx.xml  --omit dev || true

            - name: Install Cosign
              uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
              with:
                  cosign-release: "v2.4.1"

            - name: Sign build artifact and SBOM with Cosign (keyless)
              env:
                  COSIGN_EXPERIMENTAL: "true"
              run: |
                  cosign sign-blob --yes build/index.js --output-signature build/index.js.sig --output-certificate build/index.js.pem || true
                  cosign sign-blob --yes sbom.cdx.json   --output-signature sbom.cdx.json.sig    --output-certificate sbom.cdx.json.pem || true

            - name: Attest Build Provenance
              uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
              with:
                  subject-path: |
                      build/index.js
                      build/index-http.js
                      package.json
                      sbom.cdx.json
                      sbom.cdx.xml

            - name: Upload SBOM and signatures as artifacts
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: supply-chain
                  path: |
                      sbom.cdx.json
                      sbom.cdx.xml
                      build/index.js.sig
                      build/index.js.pem
                      sbom.cdx.json.sig
                      sbom.cdx.json.pem

            - name: Semantic Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # No NPM_TOKEN: npm publish authenticates against the
                  # registry via OIDC trusted publishing
                  # (https://docs.npmjs.com/trusted-publishers). The trusted
                  # publisher for @bit2me/mcp-server is configured to accept
                  # this exact workflow (bit2me-devs/bit2me-mcp/release.yml)
                  # plus the `id-token: write` permission granted at job
                  # level above.
                  NPM_CONFIG_PROVENANCE: true
              run: pnpm dlx semantic-release

            # NOTE: Auto-pushes back to main are intentionally NOT performed
            # here. The "main" ruleset only allows admin users to bypass and
            # the GITHUB_TOKEN we hold in this workflow runs as the
            # `github-actions[bot]`, which is not an admin. CHANGELOG.md and
            # version bumps in package.json are sourced of truth on the
            # published npm tarball and on the GitHub Release page; the
            # in-tree CHANGELOG.md is regenerated periodically via a manual
            # PR by a maintainer.
