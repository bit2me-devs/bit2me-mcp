name: Release

on:
    push:
        branches:
            - main

permissions: read-all

jobs:
    release:
        name: Semantic Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
            id-token: write
            attestations: write

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  persist-credentials: true
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup pnpm
              uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: "22"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Test
              run: pnpm test

            - name: Generate SBOM (CycloneDX)
              run: |
                  pnpm dlx @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.cdx.json --omit dev || true
                  pnpm dlx @cyclonedx/cyclonedx-npm --output-format xml  --output-file sbom.cdx.xml  --omit dev || true

            - name: Install Cosign
              uses: sigstore/cosign-installer@v3
              with:
                  cosign-release: "v2.4.1"

            - name: Sign build artifact and SBOM with Cosign (keyless)
              env:
                  COSIGN_EXPERIMENTAL: "true"
              run: |
                  cosign sign-blob --yes build/index.js --output-signature build/index.js.sig --output-certificate build/index.js.pem || true
                  cosign sign-blob --yes sbom.cdx.json   --output-signature sbom.cdx.json.sig    --output-certificate sbom.cdx.json.pem || true

            - name: Attest Build Provenance
              uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
              with:
                  subject-path: |
                      build/index.js
                      build/index-http.js
                      package.json
                      sbom.cdx.json
                      sbom.cdx.xml

            - name: Upload SBOM and signatures as artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: supply-chain
                  path: |
                      sbom.cdx.json
                      sbom.cdx.xml
                      build/index.js.sig
                      build/index.js.pem
                      sbom.cdx.json.sig
                      sbom.cdx.json.pem

            - name: Semantic Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_CONFIG_PROVENANCE: true
              run: pnpm dlx semantic-release

            - name: Regenerate documentation with new version
              run: |
                  pnpm run build:docs
                  if git diff --quiet; then
                    echo "No documentation changes detected"
                  else
                    git config --local user.email "github-actions[bot]@users.noreply.github.com"
                    git config --local user.name "github-actions[bot]"
                    git add landing/tools-data.js TOOLS_DOCUMENTATION.md
                    VERSION=$(node -p "require('./package.json').version")
                    git commit -m "docs: regenerate documentation with version ${VERSION} [skip ci]" --no-verify
                    git push
                  fi
