name: Deploy Landing Page

on:
    # Se ejecuta cuando haces push a la rama 'main'
    push:
        branches: ["main"]

    # Te permite ejecutarlo manualmente desde la pestaña Actions si lo necesitas
    workflow_dispatch:

# Permisos necesarios para que el bot pueda escribir en GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Solo permitimos un deploy a la vez para no liar las cosas
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  # `generate-tools-docs.js` resolves the landing-page
                  # version from `git describe --tags --abbrev=0`. The
                  # default shallow checkout (`fetch-depth: 1`) doesn't
                  # bring tags, so we either ask for tags explicitly or
                  # do a full fetch. We pick `fetch-tags: true` because
                  # it's the smallest extra payload that still gives us
                  # the data the script needs.
                  fetch-depth: 0
                  fetch-tags: true

            - name: Setup pnpm
              uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

            - name: Setup Node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm run lint

            - name: Test
              run: pnpm test

            - name: Build
              run: pnpm run build

            - name: Generate landing tools data (embeds latest released version)
              run: pnpm run build:docs

            - name: Generate LLM Docs
              run: pnpm run build:llms

            - name: Minify HTML for production
              run: MINIFY=true node scripts/minify-html.js

            - name: Configurar GitHub Pages
              uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

            - name: Subir los archivos de la carpeta docs
              uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
              with:
                  path: "./landing"

            - name: Desplegar a GitHub Pages
              id: deployment
              uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
