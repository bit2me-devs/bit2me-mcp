name: Weekly Dependency Audit

# Runs `pnpm audit` once a week (Mondays 06:00 UTC) and on demand. Failures
# do NOT break PRs — they show up as a tracked issue so the maintainers
# notice newly disclosed CVEs in the supply chain without forcing a hot
# fix at the moment of disclosure.
on:
    schedule:
        - cron: "0 6 * * 1"
    workflow_dispatch: {}

permissions:
    contents: read
    issues: write

jobs:
    audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: "22"
                  cache: "pnpm"

            - run: pnpm install --frozen-lockfile

            - name: Run audit
              id: audit
              run: |
                  set +e
                  pnpm audit --prod --audit-level=high --json > audit.json
                  echo "exit_code=$?" >> $GITHUB_OUTPUT
                  cat audit.json | head -200 || true

            - name: Open issue when vulnerabilities are found
              if: steps.audit.outputs.exit_code != '0'
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              with:
                  script: |
                      const fs = require('fs');
                      const body = fs.readFileSync('audit.json', 'utf8');
                      await github.rest.issues.create({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        title: `[security] Weekly audit found vulnerabilities (${new Date().toISOString().slice(0,10)})`,
                        body: '```json\n' + body.slice(0, 60000) + '\n```',
                        labels: ['security', 'dependencies'],
                      });
