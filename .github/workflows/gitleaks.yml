name: Gitleaks Secret Scanning

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]
    schedule:
        # Run secret scanning weekly on Mondays at 01:00 UTC
        - cron: "0 1 * * 1"
    workflow_dispatch:

permissions: read-all

jobs:
    scan:
        name: Gitleaks Secret Scan
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0 # Fetch all history for better detection

            - name: Download Gitleaks
              run: |
                  GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
                  VERSION_NUMBER=${GITLEAKS_VERSION#v}
                  wget -qO- https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${VERSION_NUMBER}_linux_x64.tar.gz | tar -xz
                  chmod +x gitleaks
                  sudo mv gitleaks /usr/local/bin/
                  gitleaks version

            - name: Run Gitleaks
              id: gitleaks
              run: |
                  # `gitleaks detect` exits 1 when secrets are found. We DO want
                  # the workflow to fail in that case, but only AFTER the SARIF
                  # report has been written and uploaded — otherwise the upload
                  # step fails with "Path does not exist: results.sarif" and we
                  # lose the diagnostic in the GitHub Security tab.
                  #
                  # Strategy: capture the exit code, always write the report,
                  # and re-fail at the end of the job (see "Fail if leaks
                  # detected" below). `--exit-code 0` tells gitleaks to always
                  # return 0; we look at the report to decide failure.
                  set +e
                  gitleaks detect \
                    --source . \
                    --config .gitleaks.toml \
                    --verbose \
                    --redact \
                    --exit-code 0 \
                    --report-format sarif \
                    --report-path results.sarif
                  GITLEAKS_RC=$?
                  set -e

                  # Defensive: ensure the SARIF file always exists, even if
                  # gitleaks itself crashed before writing it. An empty SARIF
                  # skeleton is enough for upload-sarif not to fail.
                  if [ ! -f results.sarif ]; then
                    echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"gitleaks","informationUri":"https://github.com/gitleaks/gitleaks"}},"results":[]}]}' > results.sarif
                  fi

                  # Count findings so the next step can fail the build cleanly.
                  FINDING_COUNT=$(jq '[.runs[].results[]] | length' results.sarif 2>/dev/null || echo 0)
                  echo "finding_count=${FINDING_COUNT}" >> "$GITHUB_OUTPUT"
                  echo "gitleaks_rc=${GITLEAKS_RC}" >> "$GITHUB_OUTPUT"
                  echo "Gitleaks raw exit code: ${GITLEAKS_RC}; findings: ${FINDING_COUNT}"

            - name: Upload results to GitHub Security
              if: always()
              uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
              with:
                  sarif_file: results.sarif

            - name: Fail if leaks detected
              if: always() && steps.gitleaks.outputs.finding_count != '0'
              run: |
                  echo "::error::Gitleaks reported ${{ steps.gitleaks.outputs.finding_count }} potential secret(s). See the Security tab for details."
                  exit 1

