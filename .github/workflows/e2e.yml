name: E2E Tests

on:
    push:
        branches:
            - main
    pull_request:
    schedule:
        # Run daily at 6 AM UTC to detect Bit2Me API breaking changes
        - cron: '0 6 * * *'

permissions: read-all

jobs:
    e2e:
        name: E2E Tests (Real API)
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup pnpm
              uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '22'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Run E2E Tests
              env:
                  BIT2ME_API_KEY: ${{ secrets.BIT2ME_API_KEY }}
                  BIT2ME_API_SECRET: ${{ secrets.BIT2ME_API_SECRET }}
                  GH_EVENT_NAME: ${{ github.event_name }}
              # Real-API E2E tests need live credentials. Forks and the
              # vast majority of PR triggers won't have the secrets,
              # which is fine — we skip with a warning. The scheduled
              # nightly run *must* succeed though, because that's the
              # canary that detects breaking changes upstream; missing
              # secrets there are a configuration regression and we
              # fail loudly.
              run: |
                  if [ -z "$BIT2ME_API_KEY" ] || [ -z "$BIT2ME_API_SECRET" ]; then
                      if [ "$GH_EVENT_NAME" = "schedule" ]; then
                          echo "::error::BIT2ME_API_KEY / BIT2ME_API_SECRET missing in scheduled run; cannot probe real API."
                          exit 1
                      fi
                      echo "::warning::BIT2ME_API_KEY / BIT2ME_API_SECRET not configured for this run; skipping real-API E2E tests."
                      exit 0
                  fi
                  pnpm run test:e2e

            - name: Notify on Failure (Scheduled)
              if: failure() && github.event_name == 'schedule'
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              with:
                  script: |
                      github.rest.issues.create({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        title: '⚠️ E2E Tests Failed - Possible Bit2Me API Change',
                        body: `The scheduled E2E tests have failed. This may indicate a breaking change in the Bit2Me API.\n\nCheck the [failed workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`,
                        labels: ['bug', 'e2e', 'api-change']
                      });
